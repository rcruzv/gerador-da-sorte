<div class="w-full max-w-4xl mx-auto bg-white rounded-2xl shadow-lg p-6 md:p-8">
  <div class="text-center mb-8">
    <h1 class="text-3xl md:text-4xl font-bold text-blue-700">
      Gerador Inteligente Quina
    </h1>
    <p class="text-gray-600 mt-2">Gere jogos com 5 dezenas entre 1 e 80.</p>
    <p class="text-xs text-gray-500 mt-2">
      Os jogos são sugestões aleatórias e não garantem prêmio.
    </p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <div class="bg-gray-50 p-6 rounded-lg border border-gray-200">
      <h2 class="text-xl font-semibold text-gray-800 mb-4">
        Defina sua Aposta
      </h2>
      <label
        for="num-games-quina"
        class="block text-sm font-medium text-gray-700 mb-1"
      >
        Quantidade de jogos a gerar:
      </label>
      <input
        #numGames
        type="number"
        id="num-games-quina"
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm"
        value="3"
        min="1"
        max="50"
      />
      <button
        (click)="gerarJogos(numGames.value)"
        class="w-full mt-6 bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition-all"
      >
        Gerar combinações
      </button>
      <div
        *ngIf="mensagem"
        [ngClass]="{
          'text-red-600': tipoMensagem === 'error',
          'text-green-600': tipoMensagem === 'success',
        }"
        class="mt-4 text-sm text-center font-semibold"
      >
        {{ mensagem }}
      </div>
    </div>

    <div class="bg-blue-50 p-6 rounded-lg border border-blue-200">
      <h2 class="text-xl font-semibold text-gray-800 mb-4">Regras</h2>
      <ul class="space-y-3 text-gray-700 text-sm">
        <li>
          <span class="text-blue-600 font-bold mr-2">✓</span>5 dezenas por jogo.
        </li>
        <li>
          <span class="text-blue-600 font-bold mr-2">✓</span>Dezenas entre 1 e
          80.
        </li>
        <li>
          <span class="text-blue-600 font-bold mr-2">✓</span>Até 50 jogos por
          geração.
        </li>
      </ul>
    </div>
  </div>

  <div class="mt-8" *ngIf="jogosGerados.length > 0">
    <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center">
      Jogos Gerados
    </h2>
    <div
      *ngFor="let jogo of jogosGerados; let i = index"
      class="bg-white p-4 rounded-lg shadow-md mb-4 flex flex-wrap items-center justify-between fade-in"
    >
      <div>
        <span *ngFor="let numero of jogo" class="number-ball-quina">
          {{ numero | number: "2.0" }}
        </span>
      </div>
      <button
        (click)="copiarJogo(jogo, i)"
        class="bg-gray-200 text-gray-700 text-sm font-semibold py-1 px-3 rounded-md hover:bg-gray-300 transition-colors mt-3 sm:mt-0"
      >
        {{ statusCopia[i] || "Copiar" }}
      </button>
    </div>
  </div>
</div>
