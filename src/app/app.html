<div class="dashboard-shell">
  <aside class="sidebar" aria-label="Menu principal">
    <div class="sidebar-brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 48 48" focusable="false">
          <circle cx="24" cy="24" r="19" />
          <path d="m15 24 6 6 13-15" />
          <path d="M12 14h3M33 35h3M35 12v3M13 33v3" />
        </svg>
      </span>
      <div>
        <strong>Gerador da Sorte</strong>
        <span>Laboratório de probabilidade</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
        <span class="nav-icon" aria-hidden="true">⌂</span>
        <span>Início</span>
      </a>
      <a routerLink="/megasena" routerLinkActive="active-link">
        <span class="nav-icon" aria-hidden="true">6</span>
        <span>Mega-Sena</span>
      </a>
      <a routerLink="/lotofacil" routerLinkActive="active-link">
        <span class="nav-icon" aria-hidden="true">15</span>
        <span>Lotofácil</span>
      </a>
      <a routerLink="/estatisticas" routerLinkActive="active-link">
        <span class="nav-icon" aria-hidden="true">%</span>
        <span>Estatísticas</span>
      </a>
      <a routerLink="/quina" routerLinkActive="active-link">
        <span class="nav-icon" aria-hidden="true">5</span>
        <span>Quina</span>
      </a>
      <a routerLink="/loteca" routerLinkActive="active-link">
        <span class="nav-icon" aria-hidden="true">1X2</span>
        <span>Loteca</span>
      </a>
    </nav>
  </aside>

  <div class="dashboard-main">
    <header class="topbar">
      <div class="topbar-title">
        <span>Menu principal</span>
        <strong>Geradores e análises</strong>
      </div>

      <button
        type="button"
        class="icon-button tooltip"
        aria-label="Alternar tela cheia"
        data-tooltip="Tela cheia"
        title="Tela cheia"
        (click)="toggleFullscreen()"
      >
        <svg
          aria-hidden="true"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M8 3H5a2 2 0 0 0-2 2v3" />
          <path d="M16 3h3a2 2 0 0 1 2 2v3" />
          <path d="M21 16v3a2 2 0 0 1-2 2h-3" />
          <path d="M8 21H5a2 2 0 0 1-2-2v-3" />
        </svg>
      </button>
    </header>

    <main class="dashboard-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
