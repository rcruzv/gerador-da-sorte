<div class="dashboard-shell">
  <aside class="sidebar" aria-label="Menu principal">
    <div class="sidebar-brand">
      <span class="brand-mark" aria-hidden="true">✦</span>
      <div>
        <strong>Gerador da Sorte</strong>
        <span>Dashboard</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/megasena" routerLinkActive="active-link">
        <span class="nav-icon" aria-hidden="true">●</span>
        <span>Mega-Sena</span>
      </a>
      <a routerLink="/lotofacil" routerLinkActive="active-link">
        <span class="nav-icon" aria-hidden="true">◆</span>
        <span>Lotofácil</span>
      </a>
      <a routerLink="/quina" routerLinkActive="active-link">
        <span class="nav-icon" aria-hidden="true">⬟</span>
        <span>Quina</span>
      </a>
      <a routerLink="/loteca" routerLinkActive="active-link">
        <span class="nav-icon" aria-hidden="true">▣</span>
        <span>Loteca</span>
      </a>
    </nav>
  </aside>

  <div class="dashboard-main">
    <header class="topbar">
      <div class="topbar-title">
        <span>Menu</span>
        <strong>Geradores de jogos</strong>
      </div>

      <button
        type="button"
        class="icon-button tooltip"
        aria-label="Alternar tela cheia"
        data-tooltip="Tela cheia"
        title="Tela cheia"
        (click)="toggleFullscreen()"
      >
        <svg
          aria-hidden="true"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M8 3H5a2 2 0 0 0-2 2v3" />
          <path d="M16 3h3a2 2 0 0 1 2 2v3" />
          <path d="M21 16v3a2 2 0 0 1-2 2h-3" />
          <path d="M8 21H5a2 2 0 0 1-2-2v-3" />
        </svg>
      </button>
    </header>

    <main class="dashboard-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
